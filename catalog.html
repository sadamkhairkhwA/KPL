<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khair Khwa Pharma — Product Catalog</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #1a2a3a; }
    h1 { color: #1a5fb4; margin-bottom: 0.25rem; }
    .sub { color: #555; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.88rem; }
    th, td { border: 1px solid #ddd; padding: 0.55rem 0.65rem; text-align: left; vertical-align: top; }
    th { background: #f0f4f8; }
    tr:nth-child(even) { background: #fafbfc; }
    .brand { font-weight: 700; color: #1a5fb4; }
    .note { margin-top: 2rem; font-size: 0.85rem; color: #666; }
    .cover { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
    @media print { .no-print { display: none; } .cover { max-height: 200px; object-fit: contain; } }
  </style>
</head>
<body>
  <h1>Khair Khwa Pharma</h1>
  <p class="sub">World Medicine (Turkey) · Imported &amp; distributed in Afghanistan</p>
  <p class="no-print"><button onclick="window.print()">Print / Save as PDF</button> · <a href="index.html">Back to website</a></p>
  <img class="cover no-print" src="assets/products-catalog.jpg" alt="Khair Khwa Pharma product range" width="800" loading="lazy" />
  <table>
    <thead>
      <tr>
        <th>Brand</th>
        <th>Active ingredient</th>
        <th>Form / pack</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <p class="note">Contact: +93 78 531 5959 · info@kpl.af · Nijrab Sharif Market, Kabul, Afghanistan</p>
  <script type="module">
    import { products } from "./js/products.data.js";
    const tbody = document.getElementById("rows");
    const catLabel = {
      antibiotics: "Antibiotics",
      vitamins: "Vitamins",
      pain: "Pain / NSAID",
      respiratory: "Respiratory",
      gastro: "Gastro",
      cns: "CNS / Psychiatry",
    };
    tbody.innerHTML = products
      .map(
        (p) => `<tr>
          <td class="brand">${p.name.en}</td>
          <td>${p.generic?.en || "—"}</td>
          <td>${p.form?.en || ""}</td>
          <td>${catLabel[p.category] || p.category}</td>
        </tr>`
      )
      .join("");
  </script>
</body>
</html>
